<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="ex1.css">
</head>
<body>
    <h1>Dados da conta</h1>
    <hr>
    <img src="imgs/form1_back.jpg" alt="formulario">
    <form action="send">
        <fieldset>
            <legend>Dados pessoais</legend>
            <div>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" size="80px">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" size="80px">
        </div>
        </fieldset>
        <fieldset>
            <legend>Dados da conta</legend>
            <div>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" size="80px">
            <label for="frase">Frase opcional:</label>
            <input type="text" id="frase" name="frase" size="80px" class="larger">
        </div>
        </fieldset>

    <input type="submit" value="enviar">
    </form>
</body>
</html>
