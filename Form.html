<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <h1>Adicionar novo paciente</h1>
    <hr>

    <form action="">
        <table>
            <tr>
                <td>
                    <label for="nome">Nome: </label>
                    <input type="text" id="nome" name="nome">
                </td>
            </tr>
            <tr>
                <td><label for="peso">Peso: </label>
                <input type="number" id="peso" name="peso" placeholder="Digite o nome do seu paciente">
            </td>
                <td><label for="altura">Altura: </label>
                <input type="number" id="altura" name="altura" placeholder="Digite o peso do seu paciente">
            </td>
                <td><label for="gordura">% de gordura: </label>
                <input type="number" id="gordura" name="gordura" placeholder="Digite a porcentagem de gordura do seu paciente">
            </td>
            </tr>
        </table>
        <input type="submit" value="Adicionar">
    </form>
</body>
</html>
